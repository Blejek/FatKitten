<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FatKitten</title>
    <link rel="stylesheet" href="style.css">

    <script type="text/javascript" src="https://unpkg.com/@zxing/browser@latest"></script>
</head>
<body>
    <h1>
        FatKitten
    </h1>

    <p></p>
    
    <video id="video" width="100%" style="border: 1px solid gray"></video>
    <p id="result">Waiting for scan...</p>

    <script>
    const codeReader = new ZXingBrowser.BrowserMultiFormatReader();
    const videoElement = document.getElementById('video');

    async function startScanner() {
        // 1. Get available cameras
        const videoInputDevices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();
        
        // 2. Select the back camera (usually the last one in the list)
        const selectedDeviceId = videoInputDevices[videoInputDevices.length - 1].deviceId;

        // 3. Start decoding from the video stream
        codeReader.decodeFromVideoDevice(selectedDeviceId, videoElement, (result, err) => {
        if (result) {
            document.getElementById('result').textContent = "Result: " + result.getText();
            console.log(result);
        }
        if (err && !(err instanceof ZXingBrowser.NotFoundException)) {
            console.error(err);
        }
        });
    }

    startScanner();
    </script>

    <script src="script.js"></script>
</body>
</html>
